tests:
  LDES-feeds-marineinfo:
    image: ghcr.io/vliz-be-opsci/grmp-test-implementations-ldes-validation:main
    config:
      TIMEOUT: 600  # Optional: timeout in seconds
      URLS: ['https://marineinfo.org/feed/institute', 'https://marineinfo.org/feed/dataset','https://marineinfo.org/feed/publication','https://marineinfo.org/feed/person','https://marineinfo.org/feed/project', 'https://marineinfo.org/feed/event']
      MIN-MEMBERS: 20
      MIN-FRAGMENTS: 10
      create-issue: true
      MAX-AGE-YOUNGEST-MEMBER: 730
  LDES-feed-aphia:
    image: ghcr.io/vliz-be-opsci/grmp-test-implementations-ldes-validation:main
    config:
      TIMEOUT: 600  # Optional: timeout in seconds
      URLS: ['http://aphia.org/feed']
      MIN-MEMBERS: 20
      MIN-FRAGMENTS: 6
      create-issue: true
      MAX-AGE-YOUNGEST-MEMBER: 730
  LDES-feed-marine-regions: 
    image: ghcr.io/vliz-be-opsci/grmp-test-implementations-ldes-validation:main
    config:
      TIMEOUT: 600  # Optional: timeout in seconds
      URLS: ['https://marineregions.org/feed.ttl']
      MIN-MEMBERS: 20
      MIN-FRAGMENTS: 6
      create-issue: true
      MAX-AGE-YOUNGEST-MEMBER: 730
  marineinfo-person-resource-availability:
    image: ghcr.io/vliz-be-opsci/grmp-test-implementations-resource-availability:main
    config:
      create-issue: true
      urls: 
        - https://marineinfo.org/en/doc/person/46372
        - https://marineinfo.org/id/person/46372
        - https://marineinfo.org/doc/person/46372
